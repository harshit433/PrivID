# Production Docker Compose for TrustRoute backend
# Usage:
#   cp api/.env.production.example api/.env.production
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Recommended: DigitalOcean Droplet ($12/mo, 2GB RAM)
# or Railway (free tier → $5/mo Pro plan)

version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: trustroute-api:latest
    container_name: trustroute_api
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - '${API_PORT:-3000}:3000'
    env_file:
      - api/.env.production
    environment:
      DATABASE_URL: postgresql://trustroute:${POSTGRES_PASSWORD}@postgres:5432/privid
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      JWT_PRIVATE_KEY_PATH: /app/api/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/api/keys/public.pem
      NODE_ENV: production
      EXPRESS_JSON_LIMIT: 15mb
    volumes:
      - ./api/keys:/app/api/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: trustroute_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustroute
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: privid
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    # NOTE: don't expose 5432 in production — only accessible internally
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trustroute -d privid']
      interval: 10s
      timeout: 5s
      retries: 5

  business-api:
    build:
      context: .
      dockerfile: Dockerfile.business-api
    image: trustroute-business-api:latest
    container_name: trustroute_business_api
    restart: unless-stopped
    platform: linux/amd64
    ports:
      - '${BUSINESS_API_PORT:-3002}:3002'
    env_file:
      - api/.env.production
    environment:
      DATABASE_URL: postgresql://trustroute:${POSTGRES_PASSWORD}@postgres:5432/privid
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      BUSINESS_API_PORT: 3002
      NODE_ENV: production
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    image: trustroute-worker:latest
    container_name: trustroute_worker
    restart: unless-stopped
    platform: linux/amd64
    env_file:
      - api/.env.production
    environment:
      DATABASE_URL: postgresql://trustroute:${POSTGRES_PASSWORD}@postgres:5432/privid
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set}@redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: trustroute_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: trustroute_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
