# API: docker compose up -d --build
# Matrix: MATRIX_JWT_SECRET=... bash synapse/generate-config.sh && docker compose up -d synapse

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: trustroute-api:latest
    container_name: trustroute_api
    restart: unless-stopped
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - '${API_PORT:-3000}:3000'
    env_file:
      - api/.env
    environment:
      DATABASE_URL: postgresql://trustroute:trustroute_dev@postgres:5432/privid
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: /app/api/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/api/keys/public.pem
      API_BASE_URL: http://localhost:3000
      EXPRESS_JSON_LIMIT: 15mb
      MATRIX_HOMESERVER_URL: http://synapse:8008
      MATRIX_PUBLIC_HOMESERVER_URL: ${MATRIX_PUBLIC_HOMESERVER_URL:-http://localhost:8008}
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-trustroute.local}
      MATRIX_JWT_SECRET: ${MATRIX_JWT_SECRET:-dev_matrix_jwt_secret_change_me}
      MATRIX_ADMIN_TOKEN: ${MATRIX_ADMIN_TOKEN:-}
      MATRIX_ROOM_ENCRYPTION: ${MATRIX_ROOM_ENCRYPTION:-false}
    volumes:
      - ./api/keys:/app/api/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      synapse:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: trustroute_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustroute
      POSTGRES_PASSWORD: trustroute_dev
      POSTGRES_DB: privid
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trustroute -d privid']
      interval: 5s
      timeout: 5s
      retries: 5

  business-api:
    build:
      context: .
      dockerfile: Dockerfile.business-api
    image: trustroute-business-api:latest
    container_name: trustroute_business_api
    restart: unless-stopped
    ports:
      - '${BUSINESS_API_PORT:-3002}:3002'
    env_file:
      - api/.env
    environment:
      DATABASE_URL: postgresql://trustroute:trustroute_dev@postgres:5432/privid
      REDIS_URL: redis://redis:6379
      BUSINESS_API_PORT: 3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3002/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: trustroute_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Private Matrix homeserver (Synapse). Messaging transport for TrustRoute.
  # Generate config first: MATRIX_JWT_SECRET=... bash synapse/generate-config.sh
  synapse-db-init:
    image: postgres:16-alpine
    restart: 'no'
    environment:
      PGPASSWORD: trustroute_dev
    entrypoint:
      - /bin/sh
      - -c
      - |
        psql -h postgres -U trustroute -d privid -tc "SELECT 1 FROM pg_database WHERE datname = 'synapse'" | grep -q 1 \
          || psql -h postgres -U trustroute -d privid -c "CREATE DATABASE synapse OWNER trustroute;"
    depends_on:
      postgres:
        condition: service_healthy

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: trustroute_synapse
    restart: unless-stopped
    ports:
      - '${MATRIX_PORT:-8008}:8008'
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
      UID: '991'
      GID: '991'
    volumes:
      - ./synapse/data:/data
    depends_on:
      postgres:
        condition: service_healthy
      synapse-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8008/health >/dev/null || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
