# API + 3DiVi: docker compose up -d --build
# Place Linux SDK in ./threedivi-sdk/ (see threedivi-sdk/README.md)

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: trustroute-api:latest
    container_name: trustroute_api
    restart: unless-stopped
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    ports:
      - '${API_PORT:-3000}:3000'
    env_file:
      - api/.env
    environment:
      DATABASE_URL: postgresql://trustroute:trustroute_dev@postgres:5432/privid
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: /app/api/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/api/keys/public.pem
      THREEDIVI_SDK_PATH: /opt/threedivi-sdk
      THREEDIVI_NODE_API_PATH: /opt/threedivi-sdk/node_js_api
      THREEDIVI_RUNNER: python
      API_BASE_URL: http://localhost:3000
      EXPRESS_JSON_LIMIT: 15mb
    volumes:
      - ./threedivi-sdk:/opt/threedivi-sdk:ro
      - ./api/keys:/app/api/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: trustroute_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trustroute
      POSTGRES_PASSWORD: trustroute_dev
      POSTGRES_DB: trustroute
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U privid']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trustroute_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
  redis_data:
